<!-- Book Mastery scratchpad: injected into built pages by build_page.py.
     Closed-book policy: the scratchpad can't tell you what a concept IS, but
     anything discoverable by executing code you can retrieve from memory is
     fair game — that's how professionals work. Nothing run here is logged. -->
<style>
  #bm-scratch-toggle { position: fixed; right: 0; top: 38%; z-index: 60;
    writing-mode: vertical-rl; padding: 0.9rem 0.45rem; border: 1px solid var(--ink);
    border-right: none; border-radius: 8px 0 0 8px; background: var(--ink); color: var(--paper);
    font: 600 0.8rem 'Helvetica Neue', Arial, sans-serif; letter-spacing: 0.08em; cursor: pointer; }
  #bm-scratch-toggle:hover { background: var(--accent); border-color: var(--accent); }
  #bm-scratch { position: fixed; top: 0; right: 0; height: 100vh; width: min(440px, 100vw);
    background: #fff; border-left: 1px solid var(--line); z-index: 50;
    display: flex; flex-direction: column; box-shadow: -6px 0 18px rgba(0,0,0,0.08); }
  #bm-scratch[hidden] { display: none; }
  #bm-scratch .bm-head { display: flex; align-items: baseline; gap: 0.6rem;
    padding: 0.8rem 1rem; border-bottom: 3px double var(--ink); }
  #bm-scratch .bm-head .eyebrow { font: 700 0.72rem/1 'Helvetica Neue', Arial, sans-serif;
    letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); }
  #bm-scratch .bm-head .bm-close { margin-left: auto; border: none; background: none;
    font-size: 1.1rem; cursor: pointer; color: var(--muted); padding: 0 0.2rem; flex: 0; }
  #bm-ed-holder { border-bottom: 1px solid var(--line); }
  #bm-ed-holder .CodeMirror { border: none; border-radius: 0; height: 11rem;
    font: 0.84rem/1.55 'SF Mono', 'Fira Code', Consolas, monospace; }
  #bm-ed { width: 100%; height: 11rem; border: none; resize: none; padding: 0.7rem;
    font: 0.84rem/1.55 'SF Mono', 'Fira Code', Consolas, monospace;
    background: var(--code-bg); color: var(--code-ink); tab-size: 4; box-sizing: border-box; }
  #bm-ed:focus { outline: none; }
  #bm-scratch .bm-bar { display: flex; gap: 0.4rem; align-items: center;
    padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--line);
    font: 0.78rem 'Helvetica Neue', Arial, sans-serif; color: var(--muted); }
  #bm-scratch .bm-bar button { flex: 0; font: 600 0.78rem 'Helvetica Neue', Arial, sans-serif;
    padding: 0.35rem 0.7rem; border: 1px solid var(--ink); border-radius: 6px;
    background: #fff; cursor: pointer; }
  #bm-scratch .bm-bar button.primary { background: var(--ink); color: var(--paper); }
  #bm-scratch .bm-bar button:hover { border-color: var(--accent); color: var(--accent); }
  #bm-scratch .bm-bar button.primary:hover { background: var(--accent); color: #fff; }
  #bm-console { flex: 1; overflow-y: auto; padding: 0.6rem 0.75rem; background: #0c0e11;
    font: 0.8rem/1.5 'SF Mono', 'Fira Code', Consolas, monospace; }
  #bm-console .bm-in { color: #8fa3b8; white-space: pre-wrap; margin-top: 0.55rem; }
  #bm-console .bm-in::before { content: '>>> '; color: #5b6b7c; }
  #bm-console .bm-out { color: #c7e3d4; white-space: pre-wrap; }
  #bm-console .bm-out.bm-err { color: #f0b9aa; }
  #bm-scratch .bm-note { padding: 0.45rem 0.75rem; font: 0.72rem 'Helvetica Neue', Arial, sans-serif;
    color: var(--muted); border-top: 1px solid var(--line); }
</style>
<button id="bm-scratch-toggle" aria-controls="bm-scratch" aria-expanded="false">PYTHON SCRATCHPAD</button>
<aside id="bm-scratch" hidden aria-label="Python scratchpad">
  <div class="bm-head">
    <span class="eyebrow">Scratchpad · Python</span>
    <button class="bm-close" id="bm-close" aria-label="close scratchpad">✕</button>
  </div>
  <div id="bm-ed-holder"><textarea id="bm-ed" spellcheck="false"
    placeholder="# Probe anything you can write from memory.&#10;# Ctrl/Cmd+Enter runs. State persists across runs."></textarea></div>
  <div class="bm-bar">
    <button class="primary" id="bm-run">▶ Run</button>
    <button id="bm-reset">Reset state</button>
    <button id="bm-clear">Clear console</button>
    <span>Ctrl/⌘+Enter</span>
  </div>
  <div id="bm-console" aria-live="polite"></div>
  <div class="bm-note">Closed book — but anything you can discover by running code you remember is fair game. Your scratchpad text is saved locally and survives closing the browser. Runs are not logged.</div>
</aside>
<script>
(function () {
  if (window.__bmScratchInit) return; window.__bmScratchInit = true;

  /* shared CDN loaders (defined here if the page hasn't already) */
  window.bmEnsurePyodide = window.bmEnsurePyodide || function () {
    if (!window.__bmPyodide) {
      window.__bmPyodide = new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js';
        s.onload = () => loadPyodide({ indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.26.4/full/' })
          .then(resolve, reject);
        s.onerror = () => reject(new Error('Could not load the Python runtime — internet required.'));
        document.head.append(s);
      });
    }
    return window.__bmPyodide;
  };
  window.bmEnsureCodeMirror = window.bmEnsureCodeMirror || function () {
    if (!window.__bmCM) {
      window.__bmCM = new Promise((resolve, reject) => {
        const css = document.createElement('link');
        css.rel = 'stylesheet';
        css.href = 'https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css';
        document.head.append(css);
        const s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js';
        s.onload = () => {
          const m = document.createElement('script');
          m.src = 'https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js';
          m.onload = () => resolve(window.CodeMirror);
          m.onerror = () => resolve(window.CodeMirror); /* mode is optional */
          document.head.append(m);
        };
        s.onerror = () => reject(new Error('CodeMirror unavailable'));
        document.head.append(s);
      });
    }
    return window.__bmCM;
  };

  const panel = document.getElementById('bm-scratch');
  const toggle = document.getElementById('bm-scratch-toggle');
  const ta = document.getElementById('bm-ed');
  const consoleEl = document.getElementById('bm-console');
  let cm = null, ns = null, cmTried = false;

  /* persistence: per exam unit, shared key for reviews */
  let pageKey = 'page';
  try { if (typeof DATA !== 'undefined' && DATA) pageKey = DATA.unit ? 'exam-' + DATA.unit : 'review'; }
  catch (e) { /* DATA not defined on raw template */ }
  const storeKey = 'bm-scratch:' + pageKey;
  try { ta.value = localStorage.getItem(storeKey) || ''; } catch (e) {}
  let saveTimer = null;
  function save() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      try { localStorage.setItem(storeKey, getVal()); } catch (e) {}
    }, 250);
  }
  function getVal() { return cm ? cm.getValue() : ta.value; }
  ta.addEventListener('input', save);

  function open() {
    panel.hidden = false; toggle.style.display = 'none';
    toggle.setAttribute('aria-expanded', 'true');
    if (!cmTried) {
      cmTried = true;
      window.bmEnsureCodeMirror().then(CM => {
        cm = CM.fromTextArea(ta, {
          mode: 'python', lineNumbers: true, indentUnit: 4, viewportMargin: Infinity,
          extraKeys: { 'Ctrl-Enter': run, 'Cmd-Enter': run }
        });
        cm.on('change', save);
        cm.focus();
      }).catch(() => { ta.focus(); }); /* offline: plain textarea still works */
    } else if (cm) { cm.refresh(); cm.focus(); } else { ta.focus(); }
  }
  function close() {
    panel.hidden = true; toggle.style.display = '';
    toggle.setAttribute('aria-expanded', 'false');
  }
  toggle.addEventListener('click', open);
  document.getElementById('bm-close').addEventListener('click', close);

  function log(cls, text) {
    const d = document.createElement('div');
    d.className = cls; d.textContent = text;
    consoleEl.append(d);
    consoleEl.scrollTop = consoleEl.scrollHeight;
    return d;
  }

  async function run() {
    const code = getVal();
    if (!code.trim()) return;
    log('bm-in', code);
    const out = log('bm-out', 'running…');
    try {
      const py = await window.bmEnsurePyodide();
      const lines = [];
      py.setStdout({ batched: t => lines.push(t) });
      py.setStderr({ batched: t => lines.push(t) });
      if (!ns) ns = py.globals.get('dict')();
      try {
        const result = await py.runPythonAsync(code, { globals: ns });
        let txt = lines.join('\n');
        if (result !== undefined && result !== null) {
          txt += (txt ? '\n' : '') + String(result);
          if (result && result.destroy) result.destroy();
        }
        out.textContent = txt || '(no output)';
      } catch (e) {
        out.textContent = (lines.join('\n') + (lines.length ? '\n' : '') + String(e.message || e)).trim();
        out.classList.add('bm-err');
      }
      consoleEl.scrollTop = consoleEl.scrollHeight;
    } catch (e) {
      out.textContent = String(e.message || e);
      out.classList.add('bm-err');
    }
  }
  document.getElementById('bm-run').addEventListener('click', run);
  ta.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); run(); }
    if (e.key === 'Tab') { /* smooth editing in the fallback textarea */
      e.preventDefault();
      const s = ta.selectionStart, t = ta.selectionEnd;
      ta.value = ta.value.slice(0, s) + '    ' + ta.value.slice(t);
      ta.selectionStart = ta.selectionEnd = s + 4;
      save();
    }
  });
  document.getElementById('bm-reset').addEventListener('click', () => {
    if (ns && ns.destroy) ns.destroy();
    ns = null;
    log('bm-out', '— state reset: variables cleared —');
  });
  document.getElementById('bm-clear').addEventListener('click', () => {
    consoleEl.replaceChildren();
  });
})();
</script>
